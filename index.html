<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>graphnote</title>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading graphnote…</p>
  </div>

  <div id="app">
    <!-- Header -->
    <header id="header">
      <span class="logo">graphnote</span>
      <div class="header-divider"></div>
      <div id="mode-buttons">
        <button class="mode-btn active" data-mode="select" title="ノード/エッジを選択・移動">Select</button>
        <button class="mode-btn" data-mode="node" title="空白クリックでノード作成">+ Node</button>
        <button class="mode-btn" data-mode="edge" title="ノードからドラッグでエッジ作成">+ Edge</button>
      </div>
      <div class="header-stats">
        <span class="stat">Nodes: <span class="stat-value" id="node-count">0</span></span>
        <span class="stat">Edges: <span class="stat-value" id="edge-count">0</span></span>
      </div>
      <button class="header-btn" id="types-btn">Types</button>
      <button class="header-btn" id="export-btn">Export</button>
      <button class="header-btn" id="import-btn">Import</button>
      <button class="header-btn danger" id="reset-btn">Reset</button>
    </header>

    <!-- Canvas -->
    <div id="canvas-wrap">
      <div id="cy"></div>
      <button id="fit-btn" class="canvas-overlay-btn">Fit</button>
    </div>

    <!-- Query toggle bar (click to open/close, drag to resize) -->
    <div id="query-toggle"><span id="query-toggle-label"></span></div>

    <!-- Horizontal resize handle (between main area and sidebar) -->
    <div id="resize-h" class="resize-handle"></div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">Properties</div>
      <div id="sidebar-empty">
        ノードまたはエッジを選択すると<br>プロパティとノートを編集できます
      </div>
      <div id="sidebar-content" style="display:none">
        <div id="element-header"></div>
        <div id="sidebar-scroll">
          <div id="properties-section">
            <div class="section-label">Properties</div>
            <div id="properties-list"></div>
            <div class="add-prop-row">
              <input class="add-prop-key" id="new-prop-key" placeholder="key" />
              <input class="add-prop-val" id="new-prop-val" placeholder="value" />
              <button class="add-prop-btn" id="add-prop-btn">Add</button>
            </div>
          </div>
          <div id="note-section">
            <div class="section-label">Note</div>
            <textarea id="note-textarea" placeholder="Markdown で自由にメモできます…"></textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- Query Panel -->
    <div id="query-panel">
      <div id="query-panel-header">
        <span class="panel-label">Cypher</span>
        <span class="shortcut-hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> to run</span>
        <button class="run-btn" id="run-btn">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><path d="M2 1.5l8 4.5-8 4.5z"/></svg>
          Run
        </button>
      </div>
      <div id="query-body">
        <textarea id="query-input" spellcheck="false" placeholder="MATCH (n) RETURN n LIMIT 10"></textarea>
        <div id="query-results">
          <span style="color: var(--text-muted); font-size: 12px;">クエリを実行すると結果が表示されます</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" style="display:none"></div>

  <!-- Dialog Overlay -->
  <div id="dialog-overlay">

    <!-- Create Node Dialog -->
    <div id="create-node-dialog" class="dialog-box">
      <div class="dialog-title">ノードを作成</div>
      <div class="dialog-field">
        <label class="dialog-label" for="cnd-type">Type (種類)</label>
        <select id="cnd-type" class="dialog-select"></select>
      </div>
      <div class="dialog-field">
        <label class="dialog-label" for="cnd-name">Name (名前)</label>
        <input id="cnd-name" class="dialog-input" placeholder="省略するとTypeと同じになります" />
      </div>
      <div class="dialog-actions">
        <button id="cnd-cancel" class="dialog-btn dialog-btn-secondary">Cancel</button>
        <button id="cnd-confirm" class="dialog-btn dialog-btn-primary">Create</button>
      </div>
    </div>

    <!-- Create Edge Dialog -->
    <div id="create-edge-dialog" class="dialog-box" style="display:none">
      <div class="dialog-title">エッジを作成</div>
      <div class="dialog-field">
        <label class="dialog-label" for="ced-type">Type (種類)</label>
        <input id="ced-type" class="dialog-input" placeholder="例: DEPENDS_ON, KNOWS, USES" />
      </div>
      <div class="dialog-actions">
        <button id="ced-cancel" class="dialog-btn dialog-btn-secondary">Cancel</button>
        <button id="ced-confirm" class="dialog-btn dialog-btn-primary">Create</button>
      </div>
    </div>

    <!-- Type Manager Dialog -->
    <div id="type-manager-dialog" class="dialog-box" style="display:none">
      <div class="dialog-title">Node Types を管理</div>
      <div class="tm-list-wrap">
        <div id="tm-list"></div>
      </div>
      <div class="tm-add-row">
        <input id="tm-new-input" class="dialog-input" placeholder="新しいタイプ名" />
        <button id="tm-add-btn" class="dialog-btn dialog-btn-primary">Add</button>
      </div>
      <div class="dialog-actions">
        <button id="tm-close-btn" class="dialog-btn dialog-btn-secondary">Close</button>
      </div>
    </div>

  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
